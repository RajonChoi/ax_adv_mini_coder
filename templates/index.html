<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding AI Agent</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .app-container { display: flex; height: 100vh; background: #f5f7fa; }

        /* Left Pane (Chat & Prompt) */
        .left-pane { width: 35%; display: flex; flex-direction: column; background: #ffffff; box-shadow: 4px 0 15px rgba(0,0,0,0.03); z-index: 10; min-width: 320px; }
        .header { padding: 25px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; text-align: center; font-size: 22px; font-weight: 700; letter-spacing: 0.5px; }
        .chat-history { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .message { padding: 14px 18px; border-radius: 12px; max-width: 85%; word-break: break-word; line-height: 1.5; font-size: 14.5px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); white-space: pre-wrap; }
        .message.user { align-self: flex-end; background: #667eea; color: white; border-bottom-right-radius: 2px; }
        .message.assistant { align-self: flex-start; background: #f8f9fa; color: #333; border-bottom-left-radius: 2px; border: 1px solid #eee; }

        .input-area { padding: 20px; border-top: 1px solid #eee; background: #fff; }
        textarea { width: 100%; height: 110px; padding: 15px; border: 2px solid #e2e8f0; border-radius: 10px; resize: none; font-family: inherit; font-size: 14px; margin-bottom: 12px; transition: border-color 0.2s; box-sizing: border-box; }
        textarea:focus { outline: none; border-color: #667eea; }
        button { width: 100%; padding: 14px; background: #667eea; color: white; border: none; border-radius: 10px; font-weight: 600; font-size: 15px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 6px rgba(102, 126, 234, 0.25); }
        button:hover:not(:disabled) { background: #5a67d8; transform: translateY(-1px); }
        button:disabled { background: #cbd5e0; cursor: not-allowed; box-shadow: none; color: #718096; }

        /* Right Pane (Logs/Terminal) */
        .right-pane { width: 65%; display: flex; flex-direction: column; background: #1e1e1e; color: #d4d4d4; }
        .logs-header { padding: 15px 25px; background: #252526; font-size: 14px; font-weight: 600; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; color: #ccc; }
        .logs-container { flex: 1; padding: 25px; overflow-y: auto; font-family: 'Consolas', 'Courier New', monospace; font-size: 13.5px; line-height: 1.6; }

        .log-node { margin-bottom: 24px; padding-left: 18px; border-left: 3px solid #007acc; animation: fadeIn 0.3s ease; }
        .log-node.error { border-left-color: #f48771; color: #f48771; }
        .log-title { font-weight: 700; color: #569cd6; margin-bottom: 8px; font-size: 14px; }
        .log-content { white-space: pre-wrap; word-break: break-word; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 6px; }

        .status-badge { background: #007acc; color: white; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 4px; }
        .right-pane ::-webkit-scrollbar-thumb { background: #444; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Left Pane -->
        <div class="left-pane">
            <div class="header">🤖 Coding AI Agent</div>
            <div class="chat-history" id="chatHistoryBox">
                <div class="message assistant">안녕하세요! 코딩 어시스턴트입니다. 작업 사항을 요청해주시면 바로 스크립트 작성 및 반영을 시작합니다.</div>
            </div>
            <div class="input-area">
                <textarea id="taskInput" placeholder="예: Python 파일에서 JSON 파싱 함수를 작성해줘.&#10;이후 '방금 만든 코드에 로깅(로그)을 더 추가해줘' 와 같이 이어서 요청할 수 있습니다."></textarea>
                <button id="submitBtn">작업 실행하기</button>
            </div>
        </div>

        <!-- Right Pane -->
        <div class="right-pane">
            <div class="logs-header">
                <span style="display: flex; align-items: center; gap: 8px;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
                    Terminal Execution Logs
                </span>
                <span id="statusBadge" class="status-badge" style="display: none;">Running...</span>
            </div>
            <div class="logs-container" id="logsContainer">
                <div style="color: #666; font-style: italic;">여기에 에이전트의 작업 로그가 실시간으로 표시됩니다...</div>
            </div>
        </div>
    </div>

    <script>
        const chatHistory = [];
        const chatHistoryBox = document.getElementById('chatHistoryBox');
        const taskInput = document.getElementById('taskInput');
        const submitBtn = document.getElementById('submitBtn');
        const logsContainer = document.getElementById('logsContainer');
        const statusBadge = document.getElementById('statusBadge');

        function appendMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = content;
            chatHistoryBox.appendChild(div);
            chatHistoryBox.scrollTop = chatHistoryBox.scrollHeight;
        }

        taskInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                submitBtn.click();
            }
        });

        submitBtn.addEventListener('click', async () => {
            const task = taskInput.value.trim();
            if (!task) return;

            // 추가 요청을 하면 기존 로그창을 비웁니다.
            logsContainer.innerHTML = '';

            appendMessage('user', task);
            taskInput.value = '';
            submitBtn.disabled = true;
            statusBadge.style.display = 'block';

            try {
                const response = await fetch('/api/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task, history: chatHistory })
                });

                if (!response.body) throw new Error("서버 응답이 없습니다.");

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let accumulatedData = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    accumulatedData += decoder.decode(value, { stream: true });
                    const lines = accumulatedData.split('\n\n');

                    // 완전하지 않은 청크 보관
                    accumulatedData = lines.pop();

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const jsonStr = line.substring(6);
                            if (!jsonStr.trim()) continue;

                            try {
                                const event = JSON.parse(jsonStr);
                                renderLogEvent(event);
                            } catch(e) {
                                console.error("JSON 파싱 에러:", e, jsonStr);
                            }
                        }
                    }
                }

                // 작업 완료 후 히스토리 기록 갱신 (서버에는 user와 assistant의 이전 대화로 쌓임)
                chatHistory.push({ role: 'user', content: task });
                chatHistory.push({ role: 'assistant', content: '모든 작업이 완료되었습니다. 수정사항이 정상적으로 적용되었는지 우측 로그를 참고해주세요.' });

                appendMessage('assistant', '✅ 작업이 완료되었습니다. \n📂 projects 폴더 아래에서 확인하실 수 있습니다.\n우측 로그를 확인하시고 추가 요청사항이 있다면 계속해서 적어주세요.');

            } catch (error) {
                renderLogEvent({ type: "node", node_name: "error", content: error.toString() });
                appendMessage('assistant', '❌ 작업 처리 중 서버 연결 오류가 발생했습니다.');
            } finally {
                submitBtn.disabled = false;
                statusBadge.style.display = 'none';
                taskInput.focus();
            }
        });

        function renderLogEvent(event) {
            const div = document.createElement('div');
            div.className = 'log-node';

            if (event.type === 'start') {
                div.innerHTML = `<div class="log-title">[Start] Project ID: ${escapeHTML(event.project_name)}</div>`;
            } else if (event.type === 'node') {
                if (event.node_name === 'error') {
                    div.classList.add('error');
                    div.innerHTML = `<div class="log-title">[오류 발생]</div><div class="log-content">${escapeHTML(event.content)}</div>`;
                } else if (event.node_name === 'final') {
                    div.innerHTML = `<div class="log-title" style="color:#dcdcaa;">[최종 반환값]</div><div class="log-content">${escapeHTML(event.content)}</div>`;
                } else {
                    div.innerHTML = `<div class="log-title">[${escapeHTML(event.node_name)}] 처리 완료</div><div class="log-content">${escapeHTML(event.content)}</div>`;
                }
            } else if (event.type === 'end') {
                div.innerHTML = `<div class="log-title" style="color: #4CAF50;">[Processing Complete] 전체 파이프라인 종료 확인</div>`;
            }

            logsContainer.appendChild(div);
            logsContainer.scrollTop = logsContainer.scrollHeight;
        }

        function escapeHTML(str) {
            if(!str) return '';
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag]));
        }
    </script>
</body>
</html>
